{% extends "base.html" %}

{% block content %}
<div class="content-section">
    <form class="needs-validation" method="POST" action="{{ url_for('main.edit_workout', workout_id=workout.id, next=request.args.get('next', '')) }}" id="workout" novalidate>
        <label>Workout</label>
        <input type="text" class="form-control" name="wtitle" id="wtitle" placeholder="Workout Titel" maxlength="80" value="{{ workout.title }}" required>
        <div class="invalid-feedback">
            Dieses Feld ist zwingend.
        </div>

        <div class="form-check mt-3 mb-2">
            <input type="checkbox" class="form-check-input" id="showOnlyMine">
            <label class="form-check-label" for="showOnlyMine">Nur meine &Uuml;bungen anzeigen</label>
        </div>

        {% if all_categories %}
        <div class="mb-2" id="categoryFilterPanel">
            <small class="text-muted d-block mb-1">Nach Kategorie filtern:</small>
            <span class="badge bg-secondary me-1 category-chip" data-cat-id="0" style="cursor:pointer;">Alle</span>
            {% for cat in all_categories %}
            <span class="badge bg-light text-dark me-1 category-chip" data-cat-id="{{ cat.id }}" style="cursor:pointer;">{{ cat.name }}</span>
            {% endfor %}
        </div>
        {% endif %}

        <div class="exercise-block">
        <label class="exercise-label"><strong>&Uuml;bung 1</strong></label>
        <div class="exercise-select-wrapper">
            <select name="exercise1" class="form-control exercise-select" form="workout">
                <optgroup label="Meine &Uuml;bungen" class="my-exercises">
                    {% for exercise in my_exercises %}
                    <option value="{{ exercise.id }}" data-owner="mine" data-counting-type="{{ exercise.counting_type }}">{{ exercise.title }}</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Andere athleten" class="other-exercises">
                    {% for exercise in other_exercises %}
                    <option value="{{ exercise.id }}" data-owner="other" data-username="{{ exercise.athlete.username }}" data-counting-type="{{ exercise.counting_type }}">{{ exercise.title }} - ({{ exercise.athlete.username }})</option>
                    {% endfor %}
                </optgroup>
            </select>
            <button type="button" class="btn btn-sm btn-outline-secondary copy-exercise-btn ms-2" title="&Uuml;bung kopieren" style="display: none;">Kopieren</button>
            <button type="button" class="btn btn-sm btn-outline-danger removeExercise ms-1" title="&Uuml;bung entfernen">&times;</button>
        </div>
        <div class="mb-3" id="exercise1">
        </div>
        <button type="button" class="btn btn-info addSet" exercise="1">Set hinzuf&uuml;gen</button>
        </div>
        <button type="button" id="addExercise" class="btn btn-success mb-3">&Uuml;bung hinzuf&uuml;gen</button>
        <input type="hidden" name="exercise_count" value="{{ prefill|length }}">
        <button type="submit" class="btn btn-primary w-100">Workout speichern</button>
    </form>
</div>

<script type="text/html" id="exercise_template">
    <div class="exercise-block">
    <label class="exercise-label"><strong>&Uuml;bung <%= exercise_num %></strong></label>
    <div class="exercise-select-wrapper">
        <select name="exercise<%= exercise_num %>" class="form-control exercise-select" form="workout">
            <optgroup label="Meine &Uuml;bungen" class="my-exercises">
                {% for exercise in my_exercises %}
                <option value="{{ exercise.id }}" data-owner="mine" data-counting-type="{{ exercise.counting_type }}">{{ exercise.title }}</option>
                {% endfor %}
            </optgroup>
            <optgroup label="Andere athleten" class="other-exercises">
                {% for exercise in other_exercises %}
                <option value="{{ exercise.id }}" data-owner="other" data-username="{{ exercise.athlete.username }}" data-counting-type="{{ exercise.counting_type }}">{{ exercise.title }} - ({{ exercise.athlete.username }})</option>
                {% endfor %}
            </optgroup>
        </select>
        <button type="button" class="btn btn-sm btn-outline-secondary copy-exercise-btn ms-2" title="&Uuml;bung kopieren" style="display: none;">Kopieren</button>
        <button type="button" class="btn btn-sm btn-outline-danger removeExercise ms-1" title="&Uuml;bung entfernen">&times;</button>
    </div>
    <div class="mb-3" id="exercise<%= exercise_num %>">
    </div>
    <button type="button" class="btn btn-info addSet" exercise="<%= exercise_num %>">Set hinzuf&uuml;gen</button>
    </div>
</script>

<script type="text/html" id="set_reps_template">
    <div class="set-row mt-3">
    <div class="d-flex justify-content-between align-items-center mb-1">
        <strong class="set-label">Set</strong>
        <button type="button" class="btn btn-sm btn-outline-danger removeSet" title="Set entfernen">&times;</button>
    </div>
    <label>Progression</label>
    <% if (levels && levels.length > 0) { %>
    <select class="form-control" name="progression<%= exercise_num %>">
        <% _.each(levels, function(lvl) { %>
        <option value="<%= lvl %>"><%= lvl %></option>
        <% }); %>
    </select>
    <% } else { %>
    <input type="text" class="form-control" name="progression<%= exercise_num %>" placeholder="Progression">
    <% } %>
    <label>Reps</label>
    <input type="text" class="form-control" name="reps<%= exercise_num %>" placeholder="Reps" required>
    <div class="invalid-feedback">
        Dieses Feld ist zwingend. Bitte nur Zahlen eingeben.
    </div>
    </div>
</script>

<script type="text/html" id="set_duration_template">
    <div class="set-row mt-3">
    <div class="d-flex justify-content-between align-items-center mb-1">
        <strong class="set-label">Set</strong>
        <button type="button" class="btn btn-sm btn-outline-danger removeSet" title="Set entfernen">&times;</button>
    </div>
    <label>Progression</label>
    <% if (levels && levels.length > 0) { %>
    <select class="form-control" name="progression<%= exercise_num %>">
        <% _.each(levels, function(lvl) { %>
        <option value="<%= lvl %>"><%= lvl %></option>
        <% }); %>
    </select>
    <% } else { %>
    <input type="text" class="form-control" name="progression<%= exercise_num %>" placeholder="Progression">
    <% } %>
    <label>Dauer (mm:ss)</label>
    <input type="text" class="form-control" name="duration<%= exercise_num %>" placeholder="00:00" pattern="[0-9]{1,2}:[0-9]{2}" required>
    <div class="invalid-feedback">
        Dieses Feld ist zwingend. Bitte im Format mm:ss eingeben.
    </div>
    </div>
</script>

<script>
var progressionMap = {{ progression_map | tojson }};
var categoryMap = {{ category_map | tojson }};
</script>

<style>
.exercise-select-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}
.exercise-select-wrapper .form-control {
    flex: 1;
}
.copy-exercise-btn {
    white-space: nowrap;
}
</style>
{% endblock content %}

{% block scripts %}
<script>
$(document).ready(function() {
    var prefill = {{ prefill | tojson }};

    if (prefill.length === 0) { return; }

    // Render exercises 2..N using the exercise_template (exercise 1 is static HTML)
    for (var i = 1; i < prefill.length; i++) {
        var num = i + 1;
        $("[name=exercise_count]").val(num);
        $("#addExercise").before(exercise_template({exercise_num: num}));
        var newSelect = $("[name='exercise" + num + "']");
        storeOriginalOptions(newSelect);
    }

    // Pre-select exercise and fill saved sets for every exercise
    prefill.forEach(function(ex, idx) {
        var num = idx + 1;
        var select = $("[name='exercise" + num + "']");
        select.val(String(ex.exercise_def_id));
        updateCopyButton(select);
        var levels = getLevelsForExercise(select);
        var countingType = getCountingType(select);

        // Clear the empty default container, then render each saved set
        $("#exercise" + num).empty();
        ex.sets.forEach(function(s) {
            var $set = $(getSetTemplate(countingType, num, levels));
            // For select dropdowns (progression levels), set the value
            var $prog = $set.find("[name='progression" + num + "']");
            $prog.val(s.progression);
            if (countingType === "duration") {
                $set.find("[name='duration" + num + "']").val(s.duration);
            } else {
                $set.find("[name='reps" + num + "']").val(s.reps);
            }
            $("#exercise" + num).append($set);
        });
    });

    applyExerciseFilter();
    renumberAllSets();
});
</script>
{% endblock scripts %}
